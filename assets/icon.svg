<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a1e"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a9eff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <rect width="128" height="128" rx="20" fill="url(#bg)"/>
  <circle cx="64" cy="64" r="30" fill="url(#glow)"/>
  <!-- Central node -->
  <circle cx="64" cy="64" r="8" fill="#4a9eff" filter="url(#blur)"/>
  <circle cx="64" cy="64" r="5" fill="#4a9eff"/>
  <!-- Orbiting nodes -->
  <circle cx="40" cy="40" r="4" fill="#50fa7b"/>
  <circle cx="88" cy="38" r="3.5" fill="#ffb86c"/>
  <circle cx="90" cy="85" r="3" fill="#bd93f9"/>
  <circle cx="38" cy="88" r="2.5" fill="#8be9fd"/>
  <circle cx="64" cy="30" r="2" fill="#ff79c6"/>
  <!-- Links -->
  <line x1="64" y1="64" x2="40" y2="40" stroke="rgba(74,158,255,0.3)" stroke-width="1"/>
  <line x1="64" y1="64" x2="88" y2="38" stroke="rgba(74,158,255,0.3)" stroke-width="1"/>
  <line x1="64" y1="64" x2="90" y2="85" stroke="rgba(74,158,255,0.3)" stroke-width="1"/>
  <line x1="64" y1="64" x2="38" y2="88" stroke="rgba(74,158,255,0.3)" stroke-width="1"/>
  <line x1="64" y1="64" x2="64" y2="30" stroke="rgba(74,158,255,0.2)" stroke-width="1"/>
  <line x1="40" y1="40" x2="64" y2="30" stroke="rgba(74,158,255,0.15)" stroke-width="0.5"/>
  <line x1="88" y1="38" x2="64" y2="30" stroke="rgba(74,158,255,0.15)" stroke-width="0.5"/>
  <!-- Small decorative nodes -->
  <circle cx="50" cy="55" r="1.5" fill="#4a9eff" opacity="0.5"/>
  <circle cx="78" cy="52" r="1.5" fill="#50fa7b" opacity="0.5"/>
  <circle cx="55" cy="75" r="1" fill="#ffb86c" opacity="0.4"/>
  <circle cx="72" cy="78" r="1" fill="#bd93f9" opacity="0.4"/>
</svg>