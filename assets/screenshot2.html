<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GraphForge 3D - Screenshot 2: Galaxy Theme</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a1e; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; width: 1200px; height: 800px; position: relative; }
.starfield { position: absolute; width: 100%; height: 100%; }
.star { position: absolute; background: #fff; border-radius: 50%; }
.nebula { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.12; }
.graph-container { position: absolute; width: 100%; height: 100%; }
.node-glow { position: absolute; border-radius: 50%; filter: blur(10px); opacity: 0.5; }
.node { position: absolute; border-radius: 50%; }
.node-label { position: absolute; color: rgba(255,255,255,0.7); font-size: 9px; white-space: nowrap; text-shadow: 0 1px 3px rgba(0,0,0,0.8); pointer-events: none; }
.link { position: absolute; height: 1px; transform-origin: left center; }
.toolbar { position: absolute; top: 12px; left: 12px; display: flex; gap: 6px; align-items: center; z-index: 10; }
.tb-btn { width: 30px; height: 30px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.08); background: rgba(10,10,30,0.85); color: rgba(255,255,255,0.6); font-size: 13px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
.tb-btn.active { background: rgba(74,158,255,0.25); color: #4a9eff; border-color: rgba(74,158,255,0.4); }
.tb-select { height: 30px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.08); background: rgba(10,10,30,0.85); color: rgba(255,255,255,0.6); font-size: 10px; padding: 0 6px; backdrop-filter: blur(8px); }
.branding { position: absolute; bottom: 16px; left: 16px; z-index: 10; }
.branding-title { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
.branding-sub { font-size: 9px; color: #4a9eff; letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
</style>
</head>
<body>
<div class="starfield" id="stars"></div>
<div class="nebula" style="width:350px;height:250px;background:#6600cc;top:5%;left:10%"></div>
<div class="nebula" style="width:280px;height:200px;background:#0066cc;top:55%;right:5%"></div>
<div class="nebula" style="width:220px;height:160px;background:#cc0066;bottom:15%;left:25%"></div>
<div class="graph-container" id="graph"></div>
<div class="toolbar">
  <div class="tb-btn">🔍</div><div class="tb-btn">🏷️</div><div class="tb-btn">🔄</div><div class="tb-btn">⏸️</div><div class="tb-btn">🎯</div>
  <select class="tb-select"><option>Galaxy</option></select>
  <select class="tb-select"><option>All Nodes</option></select>
  <div class="tb-btn">💡</div><div class="tb-btn">📊</div><div class="tb-btn">📤</div><div class="tb-btn">🎛️</div><div class="tb-btn">⏳</div>
  <select class="tb-select"><option>🔮 Nexus</option></select>
</div>
<div class="branding"><div class="branding-title">GraphForge 3D</div><div class="branding-sub">Galaxy Theme • Nexus Physics</div></div>
<script>
const stars = document.getElementById('stars');
for (let i = 0; i < 180; i++) { const s = document.createElement('div'); s.style.cssText = `position:absolute;width:${Math.random()*2+0.5}px;height:${Math.random()*2+0.5}px;background:#fff;border-radius:50%;left:${Math.random()*100}%;top:${Math.random()*100}%;opacity:${Math.random()*0.5+0.2}`; stars.appendChild(s); }
const graph = document.getElementById('graph');
const nodes = [
  {name:'Projects',x:600,y:380,r:14,color:'#4a9eff'},{name:'Meetings',x:400,y:260,r:11,color:'#50fa7b'},{name:'Research',x:800,y:300,r:10,color:'#ffb86c'},
  {name:'Journal',x:500,y:540,r:9,color:'#bd93f9'},{name:'Books',x:740,y:560,r:8,color:'#ff79c6'},{name:'Ideas',x:340,y:480,r:7,color:'#8be9fd'},
  {name:'Tasks',x:860,y:420,r:6,color:'#4a9eff'},{name:'Refs',x:460,y:200,r:5,color:'#50fa7b'},{name:'Templates',x:680,y:200,r:5,color:'#ffb86c'},
  {name:'Archive',x:300,y:340,r:4,color:'#6272a4'},{name:'Notes',x:920,y:500,r:4,color:'#bd93f9'},{name:'Drafts',x:260,y:520,r:3,color:'#8be9fd'},
];
for (let i=0;i<30;i++){const a=Math.random()*Math.PI*2,r=100+Math.random()*300;nodes.push({name:'',x:600+Math.cos(a)*r,y:380+Math.sin(a)*r,r:2+Math.random()*3,color:['#4a9eff','#50fa7b','#ffb86c','#bd93f9','#8be9fd','#ff79c6'][Math.floor(Math.random()*6)]});}
for (let i=0;i<nodes.length;i++) for(let j=i+1;j<nodes.length;j++) {
  const dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y,d=Math.sqrt(dx*dx+dy*dy);
  if(d<200&&Math.random()>0.7){const l=document.createElement('div');l.className='link';l.style.cssText=`left:${nodes[j].x}px;top:${nodes[j].y}px;width:${d}px;transform:rotate(${Math.atan2(dy,dx)*180/Math.PI}deg);opacity:${0.05+Math.random()*0.06}`;graph.appendChild(l);}
}
nodes.forEach(n => {
  const g=document.createElement('div');g.className='node-glow';g.style.cssText=`left:${n.x-n.r*2}px;top:${n.y-n.r*2}px;width:${n.r*4}px;height:${n.r*4}px;background:${n.color}`;graph.appendChild(g);
  const nd=document.createElement('div');nd.className='node';nd.style.cssText=`left:${n.x-n.r/2}px;top:${n.y-n.r/2}px;width:${n.r}px;height:${n.r}px;background:${n.color};box-shadow:0 0 ${n.r}px ${n.color}40`;graph.appendChild(nd);
  if(n.name){const l=document.createElement('div');l.className='node-label';l.textContent=n.name;l.style.cssText=`left:${n.x+n.r/2+4}px;top:${n.y-5}px`;graph.appendChild(l);}
});
</script>
</body>
</html>
